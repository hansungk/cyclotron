[smem]
smem_size = 131072       # 128KB
num_banks = 4
num_subbanks = 16        # contention domain (= numWords in strideByWord mode)
word_bytes = 4
stride_by_word = true
prealign_buf_depth = 2

# mem_type: 
#   - "two_port" = 1R+1W per subbank
#   - "two_read_one_write" = 2R+1W per subbank
mem_type = "two_port"

# "core_serialized" | "fully_serialized" | "not_serialized"
serialization = "core_serialized"

num_lanes = 16

# Tunable latency knobs
# base_overhead is additive overhead cycles per pattern
base_overhead = 5
# read_extra is extra cycles for read vs write operations
read_extra = 1

# ELF-mode issue/complete capacity
max_outstanding = 16
