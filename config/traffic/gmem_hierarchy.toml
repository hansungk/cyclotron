[traffic]
enabled = true
gmem_entry_mode = "hierarchy_only"
lockstep_patterns = true
reqs_per_pattern = 4096
num_lanes = 16

[traffic.address]
cluster_id = 0
gmem_base = 0x01000000
gmem_size_bytes = 1048576

[traffic.issue]
max_inflight_per_lane = 16
retry_backoff_min = 1

[traffic.logging]
print_traffic_lines = true
results_json = "logs/traffic/gmem_hierarchy_results.json"
results_csv = "logs/traffic/gmem_hierarchy_results.csv"

[[traffic.patterns]]
name = "hot_line@4_r"
kind = "strided"
req_bytes = 4
op = "read"
warp_stride = 0
lane_stride = 0
within_bytes = 64

[[traffic.patterns]]
name = "hot_line@4_w"
kind = "strided"
req_bytes = 4
op = "write"
warp_stride = 0
lane_stride = 0
within_bytes = 64

[[traffic.patterns]]
name = "cold_stream(1)@4_r"
kind = "strided"
req_bytes = 4
op = "read"
warp_stride = 1
lane_stride = 8
within_bytes = 1048576

[[traffic.patterns]]
name = "cold_stream(1)@4_w"
kind = "strided"
req_bytes = 4
op = "write"
warp_stride = 1
lane_stride = 8
within_bytes = 1048576

[[traffic.patterns]]
name = "split_64_to_32@4_r"
kind = "strided"
req_bytes = 4
op = "read"
warp_stride = 0
lane_stride = 8
within_bytes = 64

[[traffic.patterns]]
name = "split_64_to_32@4_w"
kind = "strided"
req_bytes = 4
op = "write"
warp_stride = 0
lane_stride = 8
within_bytes = 64

[[traffic.patterns]]
name = "cross_32b_boundary@4_r"
kind = "strided"
req_bytes = 4
op = "read"
base_offset_bytes = 28
warp_stride = 1
lane_stride = 1
within_bytes = 8

[[traffic.patterns]]
name = "cross_32b_boundary@4_w"
kind = "strided"
req_bytes = 4
