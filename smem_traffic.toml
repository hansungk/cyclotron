[muon]
num_lanes = 16
num_warps = 16
num_cores = 1
num_regs = 256
start_pc = 0x10000000

[mem]
io_cout_addr = 0xFF080000
io_cout_size = 64

[sim]
elf = "test/isa-tests/rv32ui-p-add"
timeout = 50000000
trace = false
frontend_mode = "traffic_smem"
timing = true

[timing]
include = [
  "config/timing/gmem.toml",
  "config/timing/icache.toml",
  "config/timing/lsu_scheduler.toml",
  "config/timing/smem.toml",
  "config/timing/writeback_operand_fetch.toml",
  "config/timing/barrier.toml",
  "config/timing/fence.toml",
  "config/timing/dma_tensor.toml",
  "config/timing/execute.toml",
]

# Bypass writeback queue
[timing.writeback]
enabled = false

# Bypass operand_fetch
[timing.operand_fetch]
enabled = false
